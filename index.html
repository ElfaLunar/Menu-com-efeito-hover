<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Menu com Descrição</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a href="#" onmouseover="mudarTexto('Página principal')">Início</a>
    <a href="#" onmouseover="mudarTexto('Sou uma pequena artista em andamento')">Sobre</a>
    <a href="#" onmouseover="mudarTexto('Faço marca páginas, capas de livros, criação de personagens e vendo desenhos')">Serviços</a>
    <a href="#" onmouseover="mudarTexto('luanayborini@gmail.com')">Contato</a>
  </nav>

  <div id="descricao">Passe o mouse sobre o menu</div>

  <script>
    function mudarTexto(texto) {
      document.getElementById("descricao").innerText = texto;
    }
  </script>

</body>
</html>
